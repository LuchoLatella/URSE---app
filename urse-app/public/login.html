<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control URSE — Ingresar</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Helvetica Neue', Arial, sans-serif;
  background: #1a1917;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.login-box {
  background: #fff;
  border-radius: 12px;
  padding: 40px 44px;
  width: 100%;
  max-width: 380px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}
.brand { margin-bottom: 28px; }
.brand h1 { font-size: 22px; font-weight: 700; color: #1a1917; letter-spacing: -0.5px; }
.brand p { font-size: 12px; color: #888; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.8px; }
.field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.field label { font-size: 12px; font-weight: 600; color: #555; }
.field input {
  height: 42px; padding: 0 12px;
  border: 1.5px solid #e0dfd8;
  border-radius: 7px;
  font-size: 14px;
  color: #1a1917;
  background: #faf9f7;
  transition: border-color 0.15s;
}
.field input:focus { outline: none; border-color: #2a5f8f; background: #fff; }
.btn-login {
  width: 100%; height: 42px;
  background: #1a1917; color: #fff;
  border: none; border-radius: 7px;
  font-size: 14px; font-weight: 600;
  cursor: pointer; margin-top: 6px;
  transition: background 0.15s;
}
.btn-login:hover { background: #333; }
.error { color: #9b2020; font-size: 13px; margin-top: 12px; display: none; background: #fdeaea; border-radius: 6px; padding: 8px 12px; }
.footer { margin-top: 24px; font-size: 11px; color: #bbb; text-align: center; }
</style>
</head>
<body>
<div class="login-box">
  <div class="brand">
    <h1>Control URSE</h1>
    <p>GCABA · Gestión RRHH</p>
  </div>
  <div class="field">
    <label>Usuario</label>
    <input type="text" id="username" placeholder="nombre.usuario" autocomplete="username">
  </div>
  <div class="field">
    <label>Contraseña</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>
  <button class="btn-login" onclick="doLogin()">Ingresar</button>
  <div class="error" id="error-msg"></div>
  <div class="footer">Sistema de seguimiento de URSE autorizadas</div>
</div>
<script>
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const errEl = document.getElementById('error-msg');
  errEl.style.display = 'none';
  if (!username || !password) { errEl.textContent = 'Ingresá usuario y contraseña'; errEl.style.display = 'block'; return; }
  try {
    const r = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await r.json();
    if (data.ok) { window.location.href = '/'; }
    else { errEl.textContent = data.error || 'Error al ingresar'; errEl.style.display = 'block'; }
  } catch(e) { errEl.textContent = 'Error de conexión'; errEl.style.display = 'block'; }
}
</script>
</body>
</html>
